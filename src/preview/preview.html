<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screenshot Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="preview.css">
</head>
<body>

  <!-- Toolbar -->
  <header class="toolbar">
    <div class="toolbar-left">
      <svg class="toolbar-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="10" r="5.5"/>
        <circle cx="12" cy="10" r="2.5"/>
        <circle cx="14" cy="8" r="1" fill="currentColor"/>
        <path d="M4 7l2-2h12l2 2M4 17l-1-1M20 17l1-1"/>
      </svg>
      <span class="toolbar-label" id="mode-label">Screenshot</span>
      <span class="toolbar-dim" id="dim-label"></span>
    </div>
    <div class="toolbar-right">
      <div class="fmt-group">
        <button class="fmt-btn active" data-fmt="png">PNG</button>
        <button class="fmt-btn" data-fmt="jpeg">JPEG</button>
        <button class="fmt-btn" data-fmt="webp">WebP</button>
      </div>
      <div class="q-group" id="q-group">
        <input type="range" class="q-slider" id="q-slider" min="10" max="100" value="90" step="5" aria-label="Quality">
        <span class="q-val" id="q-val">90</span>
      </div>
      <button class="act-btn download" id="btn-download" title="Download">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span>Download</span>
      </button>
      <button class="act-btn copy" id="btn-copy" title="Copy to clipboard">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
        </svg>
        <span>Copy</span>
      </button>
    </div>
  </header>

  <!-- Image canvas -->
  <main class="view" id="view">
    <div class="empty-state" id="empty-state">
      <svg class="empty-icon" viewBox="0 0 48 48" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="8" width="40" height="26" rx="3"/>
        <path d="M18 34l2 4h8l2-4"/>
        <path d="M16 18l4-4 4 4 8-8"/>
      </svg>
      <span class="empty-text">Waiting for screenshot&hellip;</span>
    </div>
    <img id="preview-img" class="preview-img" alt="Screenshot preview">
  </main>

  <!-- Status bar -->
  <footer class="sbar">
    <span id="sbar-msg" class="sbar-msg"></span>
  </footer>

  <script src="preview.js"></script>
</body>
</html>
